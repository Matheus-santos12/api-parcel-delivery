info:
  name: Sessions
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/{{RESOURCE}}"
  body:
    type: json
    data: |-
      {
        "email": "matheuss@email.com",
        "password": "12345678"
      }
  auth: inherit

runtime:
  variables:
    - name: RESOURCE
      value: sessions
  scripts:
    - type: after-response
      code: |-
        const json = res.getBody();
        bru.setEnvVar("token", json.token)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
