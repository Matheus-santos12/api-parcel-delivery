info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/{{RESOURCE}}"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: RESOURCE
      value: delivery-logs

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
