  type: http
  seq: 1

http:
  method: POST
  url: "{{BASE_URL}}/{{RESOURCE}}"
  body:
    type: json
    data: |-
      {
        "delivery_id": "40a92a90-fb78-4eaa-bf72-7d0c77919594",
